<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Reest — Aanwezigheid & Werkplekken</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --eco-green: #5B8C3E; --eco-green-light: #E8F0E0; --eco-green-dark: #3D6B27;
  --eco-accent: #F4A523; --eco-bg: #FAFBF8; --eco-card: #FFFFFF;
  --eco-text: #1A2E0A; --eco-muted: #7A8B6E; --eco-border: #E2E8D9;
  --eco-blue: #1976D2; --eco-orange: #F57C00; --eco-red: #E53935;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--eco-bg); color: var(--eco-text); min-height: 100vh; padding: 12px; }
.app { max-width: 700px; margin: 0 auto; }
.header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--eco-green-light); }
.header-icon { width: 44px; height: 44px; background: linear-gradient(135deg, #5B8C3E, #7CB55E); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 2px 8px rgba(91,140,62,0.25); flex-shrink: 0; }
.header h1 { font-family: 'Space Mono', monospace; font-size: 18px; color: var(--eco-green-dark); letter-spacing: -0.5px; line-height: 1.2; }
.header p { font-size: 12px; color: var(--eco-muted); margin-top: 1px; }
.name-section { display: flex; gap: 8px; margin-bottom: 14px; }
.name-section input, .name-section select { flex: 1; padding: 10px 14px; border: 2px solid var(--eco-border); border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; background: white; outline: none; }
.name-section input:focus, .name-section select:focus { border-color: var(--eco-green); }
.name-section select { cursor: pointer; }
.btn { padding: 10px 16px; background: var(--eco-green); color: white; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.btn:hover { background: var(--eco-green-dark); }
.btn:active { transform: scale(0.97); }
.btn-sm { padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.btn-red { background: var(--eco-red); }
.btn-red:hover { background: #C62828; }
.btn-ghost { background: #F5F5F5; color: #555; border: none; padding: 10px 16px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.user-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.user-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--eco-green-light); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: var(--eco-green-dark); }
.link-btn { background: none; border: none; font-size: 12px; color: var(--eco-muted); cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; }
.main-tabs { display: flex; gap: 4px; margin-bottom: 14px; background: white; border-radius: 12px; padding: 4px; border: 1px solid var(--eco-border); }
.main-tab { flex: 1; padding: 10px 8px; border: none; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; background: transparent; color: var(--eco-muted); transition: all 0.15s; text-align: center; }
.main-tab.active { background: var(--eco-green); color: white; box-shadow: 0 2px 6px rgba(91,140,62,0.25); }
.week-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.week-nav button { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--eco-border); background: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.week-nav button:hover { border-color: var(--eco-green); background: var(--eco-green-light); }
.week-nav span { font-size: 13px; font-weight: 500; color: var(--eco-muted); }
.day-tabs { display: flex; gap: 3px; margin-bottom: 12px; }
.day-tab { flex: 1; padding: 7px 2px; border: 2px solid transparent; border-radius: 10px; background: white; text-align: center; cursor: pointer; transition: all 0.15s; }
.day-tab:hover { border-color: var(--eco-border); }
.day-tab.active { border-color: var(--eco-green); background: var(--eco-green-light); }
.day-tab.today { box-shadow: inset 0 -3px 0 var(--eco-accent); }
.day-tab .dn { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--eco-muted); }
.day-tab .dd { font-size: 16px; font-weight: 700; color: var(--eco-text); margin-top: 1px; }
.day-tab.active .dn, .day-tab.active .dd { color: var(--eco-green-dark); }
.att-card { background: white; border-radius: 12px; border: 1px solid var(--eco-border); margin-bottom: 12px; overflow: hidden; }
.att-card h3 { font-size: 12px; color: var(--eco-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 14px 8px; }
.att-my { padding: 0 14px 14px; }
.att-my-row { display: flex; gap: 6px; flex-wrap: wrap; }
.att-chip { padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid var(--eco-border); background: white; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.att-chip:hover { border-color: var(--eco-green); }
.att-chip.selected { border-color: var(--eco-green); background: var(--eco-green-light); color: var(--eco-green-dark); }
.att-chip.hoogeveen.selected { border-color: var(--eco-green); background: #E8F0E0; }
.att-chip.thuis.selected { border-color: var(--eco-blue); background: #E3F2FD; color: #1565C0; }
.att-chip.veld.selected { border-color: var(--eco-orange); background: #FFF3E0; color: #E65100; }
.att-chip.vrij.selected { border-color: #9E9E9E; background: #F5F5F5; color: #616161; }
.att-chip.groningen.selected { border-color: #7B1FA2; background: #F3E5F5; color: #6A1B9A; }
.att-chip.almere.selected { border-color: #00838F; background: #E0F7FA; color: #006064; }
.att-chip.lochem.selected { border-color: #2E7D32; background: #E8F5E9; color: #1B5E20; }
.att-chip.breda.selected { border-color: #C62828; background: #FFEBEE; color: #B71C1C; }
.att-chip.goes.selected { border-color: #EF6C00; background: #FFF3E0; color: #E65100; }
.att-chip.ziek.selected { border-color: var(--eco-red); background: #FFEBEE; color: #C62828; }
.att-note { margin-top: 10px; display: flex; gap: 8px; }
.att-note input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--eco-border); border-radius: 8px; font-size: 12px; font-family: 'DM Sans', sans-serif; outline: none; }
.att-note input:focus { border-color: var(--eco-green); }
.att-note button { padding: 8px 12px; border-radius: 8px; border: none; background: var(--eco-green); color: white; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.period-toggle { display: flex; gap: 4px; margin-bottom: 10px; padding: 0 14px; }
.period-btn { flex: 1; padding: 6px; border: 1.5px solid var(--eco-border); border-radius: 8px; background: white; font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; font-family: 'DM Sans', sans-serif; }
.period-btn.active { border-color: var(--eco-green); background: var(--eco-green-light); color: var(--eco-green-dark); }
.team-list { padding: 0 0 10px; overflow-x: auto; }
.team-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.team-table th { font-size: 10px; font-weight: 700; color: var(--eco-muted); text-transform: uppercase; padding: 6px 4px; text-align: center; position: sticky; top: 0; background: white; }
.team-table th:first-child { text-align: left; padding-left: 12px; }
.team-table td { padding: 5px 3px; text-align: center; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
.team-table td:first-child { text-align: left; padding-left: 12px; font-weight: 600; white-space: nowrap; }
.team-table tr.me td { background: #F5F9F0; }
.team-table tr.me td:first-child { color: var(--eco-green-dark); }
.team-sep td { height: 3px; padding: 0; background: var(--eco-border); border: none; }
.week-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; white-space: nowrap; max-width: 70px; overflow: hidden; text-overflow: ellipsis; }
.wb-hoogeveen { background: #E8F0E0; color: #3D6B27; } .wb-groningen { background: #F3E5F5; color: #6A1B9A; }
.wb-almere { background: #E0F7FA; color: #006064; } .wb-lochem { background: #E8F5E9; color: #1B5E20; }
.wb-breda { background: #FFEBEE; color: #B71C1C; } .wb-goes { background: #FFF3E0; color: #E65100; }
.wb-thuis { background: #E3F2FD; color: #1565C0; } .wb-veld { background: #FFF3E0; color: #E65100; }
.wb-vrij { background: #F5F5F5; color: #757575; } .wb-ziek { background: #FFEBEE; color: #C62828; }
.wb-none { color: #ddd; }
.stats-bar { display: flex; gap: 6px; margin-bottom: 12px; }
.stat { flex: 1; padding: 8px; background: white; border-radius: 10px; border: 1px solid var(--eco-border); text-align: center; }
.stat .num { font-size: 20px; font-weight: 700; }
.stat .lbl { font-size: 9px; color: var(--eco-muted); font-weight: 600; text-transform: uppercase; margin-top: 1px; }
.plan-card { background: white; border-radius: 12px; padding: 14px; border: 1px solid var(--eco-border); margin-bottom: 12px; }
.plan-card h3 { font-size: 12px; color: var(--eco-muted); font-weight: 600; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.floor-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 14px; }
.floor-nav button { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--eco-border); background: white; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.floor-nav button:hover { border-color: var(--eco-green); background: var(--eco-green-light); }
.floor-nav button:disabled { opacity: 0.3; cursor: default; }
.floor-nav button:disabled:hover { border-color: var(--eco-border); background: white; }
.floor-label { font-size: 14px; font-weight: 700; color: var(--eco-text); min-width: 200px; text-align: center; }
.floor-sub { font-size: 11px; color: var(--eco-muted); font-weight: 400; }
.placeholder-floor { padding: 40px 20px; text-align: center; color: var(--eco-muted); font-size: 14px; background: #F9FBF7; border-radius: 10px; border: 2px dashed var(--eco-border); }
.desk { cursor: pointer; transition: opacity 0.15s; }
.desk:hover { opacity: 0.85; }
.hint { font-size: 11px; color: #9CAF88; text-align: center; padding: 6px; line-height: 1.5; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.32); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 20px; animation: fadeIn 0.15s; }
@keyframes fadeIn { from { opacity: 0; } }
.modal { background: white; border-radius: 16px; padding: 24px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.15); max-height: 90vh; overflow-y: auto; }
.modal h3 { font-size: 17px; margin-bottom: 6px; }
.modal p { font-size: 13px; color: #666; margin-bottom: 16px; line-height: 1.5; }
.modal-actions { display: flex; flex-direction: column; gap: 8px; }
.modal-btn { padding: 11px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; width: 100%; }
.modal-btn:active { transform: scale(0.97); }
.modal-btn.green { background: var(--eco-green); color: white; }
.modal-btn.orange { background: var(--eco-accent); color: white; }
.modal-btn.red { background: var(--eco-red); color: white; }
.modal-btn.ghost { background: #F5F5F5; color: #555; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 10px 22px; border-radius: 12px; font-size: 13px; font-weight: 600; z-index: 200; animation: slideUp 0.25s; font-family: 'DM Sans', sans-serif; box-shadow: 0 8px 30px rgba(0,0,0,0.12); white-space: nowrap; }
.toast.success { background: #4CAF50; color: white; }
.toast.info { background: var(--eco-blue); color: white; }
.toast.warn { background: var(--eco-orange); color: white; }
@keyframes slideUp { from { transform: translateX(-50%) translateY(20px); opacity: 0; } }

/* Admin panel */
.admin-section { background: white; border-radius: 12px; border: 1px solid var(--eco-border); margin-bottom: 12px; padding: 14px; }
.admin-section h3 { font-size: 13px; color: var(--eco-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.admin-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
.admin-row:last-child { border-bottom: none; }
.admin-row .name { flex: 1; font-weight: 600; }
.admin-input { padding: 7px 10px; border: 1.5px solid var(--eco-border); border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; width: 100%; }
.admin-input:focus { border-color: var(--eco-green); }
.admin-grid { display: grid; grid-template-columns: 100px repeat(5, 1fr); gap: 4px; font-size: 11px; align-items: center; }
.admin-grid .lbl { font-weight: 700; color: var(--eco-muted); text-transform: uppercase; padding: 4px; }
.admin-grid input { padding: 5px; border: 1.5px solid var(--eco-border); border-radius: 6px; font-size: 11px; font-family: 'DM Sans', sans-serif; outline: none; text-align: center; }
.admin-grid input:focus { border-color: var(--eco-green); }
.admin-grid .desk-label { font-weight: 700; color: var(--eco-text); padding: 4px; }
.admin-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.admin-tab { padding: 7px 14px; border: 2px solid var(--eco-border); border-radius: 8px; background: white; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.admin-tab.active { border-color: var(--eco-green); background: var(--eco-green-light); color: var(--eco-green-dark); }
.pw-section { text-align: center; padding: 30px; }
.pw-section input { padding: 12px 16px; border: 2px solid var(--eco-border); border-radius: 10px; font-size: 16px; font-family: 'DM Sans', sans-serif; text-align: center; outline: none; width: 200px; margin-bottom: 12px; }
.admin-info { font-size: 11px; color: var(--eco-muted); padding: 8px 0; font-style: italic; }

@media (max-width: 480px) {
  .header h1 { font-size: 16px; }
  .day-tab .dd { font-size: 14px; }
  .att-chip { padding: 6px 10px; font-size: 12px; }
  .admin-grid { grid-template-columns: 70px repeat(5, 1fr); font-size: 10px; }
}
.filter-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
.filter-select { flex: 1; padding: 8px 12px; border: 1.5px solid var(--eco-border); border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; outline: none; background: white; min-width: 0; }
.filter-select:focus { border-color: var(--eco-green); }
.view-toggle { display: flex; gap: 2px; flex-shrink: 0; }
.view-btn { padding: 8px 12px; border: 1.5px solid var(--eco-border); border-radius: 8px; background: white; font-size: 12px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.view-btn.active { border-color: var(--eco-green); background: var(--eco-green-light); color: var(--eco-green-dark); }
.month-cell { vertical-align: top; cursor: pointer; border-radius: 6px; }
.month-cell:hover { background: var(--eco-green-light); }
.month-cell.selected { background: var(--eco-green-light); outline: 2px solid var(--eco-green); }
.month-date { font-size: 11px; font-weight: 700; color: var(--eco-muted); margin-bottom: 2px; }
.month-date.today { color: white; background: var(--eco-accent); border-radius: 10px; padding: 0 4px; display: inline-block; }
</style>
</head>

// ── Helpers ──
const fmtDate = d => d.toISOString().split("T")[0];
const dKey    = d => DAY_KEYS[d.getDay()];

const fmtNL = d =>
  `${DAYS_NL[d.getDay()]} ${d.getDate()} ${MONTHS_SHORT[d.getMonth()]}`;

function weekLabel(off) {
  if (off ===  0) return "Deze week";
  if (off ===  1) return "Volgende week";
  if (off === -1) return "Vorige week";
  return `Week ${off > 0 ? "+" : ""}${off}`;
}

function weekDates(off) {
  const n = new Date(), m = new Date(n);
  m.setDate(n.getDate() - ((n.getDay() + 6) % 7) + off * 7);
  return Array.from({ length: 5 }, (_, i) => {
    const d = new Date(m);
    d.setDate(m.getDate() + i);
    return d;
  });
}

function monthDates(off) {
  const n     = new Date();
  const first = new Date(n.getFullYear(), n.getMonth() + off, 1);
  const last  = new Date(n.getFullYear(), n.getMonth() + off + 1, 0);
  const dates = [];
  for (let d = new Date(first); d <= last; d.setDate(d.getDate() + 1)) {
    if (d.getDay() >= 1 && d.getDay() <= 5) dates.push(new Date(d));
  }
  return dates;
}

function monthLabel(off) {
  const n = new Date();
  const d = new Date(n.getFullYear(), n.getMonth() + off, 1);
  return MONTHS_NL[d.getMonth()] + " " + d.getFullYear();
}

function getWeekNumber(d) {
  const jan4 = new Date(d.getFullYear(), 0, 4);
  return Math.ceil(((d - jan4) / 86400000 + jan4.getDay() + 1) / 7);
}

// ── Attendance ──
function getAtt(dk, name, period) {
  const k = period === "hele_dag" ? dk : `${dk}_${period}`;
  return S.attendance[k]?.[name] || null;
}
function setAtt(dk, name, status, period) {
  const k = period === "hele_dag" ? dk : `${dk}_${period}`;
  if (!S.attendance[k]) S.attendance[k] = {};
  if (status) S.attendance[k][name] = status;
  else delete S.attendance[k][name];
  save();
}
function getAttNote(dk, name) {
  return S.attendance[`${dk}_note`]?.[name] || "";
}
function setAttNote(dk, name, note) {
  const k = `${dk}_note`;
  if (!S.attendance[k]) S.attendance[k] = {};
  if (note) S.attendance[k][name] = note;
  else delete S.attendance[k][name];
  save();
}
function getEffStatus(dk, name) {
  let st = S.attendance[dk]?.[name];
  if (st) return { status: st, period: "hele_dag" };
  const am = S.attendance[`${dk}_ochtend`]?.[name];
  const pm = S.attendance[`${dk}_middag`]?.[name];
  if (am && pm && am === pm) return { status: am, period: "hele_dag" };
  if (am || pm) {
    return {
      status: am || pm,
      period: am && pm ? "split" : (am ? "ochtend" : "middag"),
      am,
      pm,
    };
  }
  return { status: null };
}

// ── Desks ──
function deskColor(st) {
  const m = {
    fixed:     { fill: "#E8F0E0", stroke: "#5B8C3E", text: "#3D6B27" },
    available: { fill: "#E8F5E9", stroke: "#66BB6A", text: "#2E7D32" },
    reserved:  { fill: "#E3F2FD", stroke: "#1976D2", text: "#1565C0" },
    mine:      { fill: "#BBDEFB", stroke: "#1565C0", text: "#0D47A1" },
    flex:      { fill: "#F5F5F5", stroke: "#BDBDBD", text: "#757575" },
  };
  return m[st] || { fill: "#F5F5F5", stroke: "#ccc", text: "#999" };
}

function computeDesks(dk, dy, loc) {
  const cfg      = getCfg();
  const schedule = loc === "grn" ? cfg.grn : loc === "hgv_bg" ? cfg.hgv_bg : cfg.hgv;
  const maxId    = loc === "grn" ? 8 : loc === "hgv_bg" ? 20 : 11;
  const pfx      = loc === "grn" ? "grn_" : loc === "hgv_bg" ? "hgvbg_" : "";
  // Determine which attendance statuses count as "present" for this floor
  const locStatuses = loc === "grn" ? ["groningen"] : ["hoogeveen"];
  const res    = S.desk.reservations[pfx + dk] || {};
  const abs    = S.desk.absences[pfx + dk]     || {};
  const states = {};
  for (let id = 1; id <= maxId; id++) {
    const fixed = schedule[id]?.[dy] || null;
    if (fixed) {
      const eff = getEffStatus(dk, fixed);
      // Person is absent if: non-office status (thuis/veld/vrij/ziek), OR at a different office, OR manually marked absent
      const isAtDifferentOffice = eff.status && OFFICE_STATUSES.includes(eff.status) && !locStatuses.includes(eff.status);
      const isNonOffice         = eff.status && !OFFICE_STATUSES.includes(eff.status);
      const absent              = isNonOffice || isAtDifferentOffice || abs[id];
      if (absent) {
        if (res[id]) {
          states[id] = { status: res[id] === S.userName ? "mine" : "reserved", fixedPerson: fixed, displayName: res[id], reservedBy: res[id] };
        } else {
          states[id] = { status: "available", fixedPerson: fixed, displayName: "vrij" };
        }
      } else {
        states[id] = { status: "fixed", fixedPerson: fixed, displayName: fixed };
      }
    } else {
      if (res[id]) {
        const r = res[id];
        states[id] = { status: r === S.userName ? "mine" : "reserved", displayName: r, reservedBy: r };
      } else {
        states[id] = { status: "flex", displayName: "flex" };
      }
    }
  }
  return states;
}

function hasFixedDesk(name, dy, loc, dateKey) {
  const cfg = getCfg();
  function checkSchedule(schedule, maxId, locId) {
    for (let id = 1; id <= maxId; id++) {
      const f = schedule[id]?.[dy];
      if (f && f.split(" ")[0] === name.split(" ")[0]) {
        // Found a fixed desk — but is it actually active (not absent)?
        if (dateKey) {
          const ds = computeDesks(dateKey, dy, locId);
          if (ds[id]?.status !== "fixed") return null; // desk was freed up
        }
        return locId === "grn" ? `G${id}` : locId === "hgv_bg" ? `BG${id}` : id;
      }
    }
    return null;
  }
  let result = null;
  if (!loc || loc === "hoogeveen") {
    result = checkSchedule(cfg.hgv, 11, "hgv");
    if (!result) result = checkSchedule(cfg.hgv_bg, 20, "hgv_bg");
  }
  if (!result && (!loc || loc === "groningen")) {
    result = checkSchedule(cfg.grn, 8, "grn");
  }
  return result;
}

// ── Week badge (top-level — calls getCfg() internally) ──
function wBadge(dk, name) {
  const cfg  = getCfg();
  const e    = getEffStatus(dk, name);
  const n    = getAttNote(dk, name);
  if (!e.status) return `<span class="week-badge wb-none">—</span>`;
  const st       = cfg.statuses.find(s => s.id === e.status);
  const noteHtml = n
    ? `<div style="font-size:8px;color:#999;font-style:italic;line-height:1.1;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin:0 auto;cursor:pointer" onclick="toast('${name}: ${n.replace(/'/g, "\\'")}','info')">${n}</div>`
    : "";
  if (e.am && e.pm && e.am !== e.pm) {
    const amCls = cfg.statuses.find(s => s.id === e.am)?.cls || "none";
    return `<span class="week-badge wb-${amCls}" style="font-size:8px">${STATUS_SHORTS[e.am] || e.am}/${STATUS_SHORTS[e.pm] || e.pm}</span>${noteHtml}`;
  }
  return `<span class="week-badge wb-${st?.cls || "none"}">${STATUS_SHORTS[e.status] || e.status}</span>${noteHtml}`;
}

// ── Attendance counts for a single day ──
function countAttendance(dk, empNames) {
  let kantoor = 0, thuis = 0, veld = 0, vrij = 0;
  for (const n of empNames) {
    const e = getEffStatus(dk, n);
    if (OFFICE_STATUSES.includes(e.status))           kantoor++;
    else if (e.status === "thuis")                    thuis++;
    else if (e.status === "veld")                     veld++;
    else if (e.status === "vrij" || e.status === "ziek") vrij++;
  }
  return { kantoor, thuis, veld, vrij };
}

// ── Stats bar renderer ──
// items: [{num, lbl, color}]
function renderStatsBar(items) {
  const cells = items.map(({ num, lbl, color }) =>
    `<div class="stat"><div class="num" style="color:${color}">${num}</div><div class="lbl">${lbl}</div></div>`
  ).join("");
  return `<div class="stats-bar">${cells}</div>`;
}

// ── Desk stats bar (fixed / available+flex / reserved+mine) ──
function renderDeskStats(ds) {
  const vals = Object.values(ds);
  const fC   = vals.filter(s => s.status === "fixed").length;
  const aC   = vals.filter(s => s.status === "available" || s.status === "flex").length;
  const rC   = vals.filter(s => s.status === "reserved"  || s.status === "mine").length;
  return renderStatsBar([
    { num: fC, lbl: "Bezet",        color: "var(--eco-green)"  },
    { num: aC, lbl: "Vrij",         color: "var(--eco-accent)" },
    { num: rC, lbl: "Gereserveerd", color: "var(--eco-blue)"   },
  ]);
}

// ── Single floor: stats + SVG + hint ──
function renderFloor(dk, dy, sel, loc, svgFn) {
  const ds = computeDesks(dk, dy, loc);

// ── Week overview table (aanwezigheid) ──
function renderWeekOverview(cfg, wd, dk) {
  let teamRows = "";
  for (const entry of cfg.employees) {
    if (entry === "|") {
      teamRows += `<tr class="team-sep"><td colspan="6"></td></tr>`;
      continue;
    }
    const isMe = entry === S.userName;
    let cells = `<td>${entry}${isMe ? ' 👤' : ''}</td>`;

  }
  const headers = ["ma","di","wo","do","vr"].map((d, i) => {
    const dt = wd[i];
    return `<th${S.selectedDayIdx === i ? ' style="color:var(--eco-green-dark)"' : ''}>${d}<br><span style="font-weight:400;font-size:9px">${dt.getDate()}</span></th>`;
  }).join("");
  return `<div class="att-card"><h3>Weekoverzicht</h3><div class="team-list"><table class="team-table"><thead><tr><th></th>${headers}</tr></thead><tbody>${teamRows}</tbody></table></div></div>`;

// ── Month calendar table (aanwezigheid) ──
function renderMonthOverview(dk, today) {
  const mDates  = monthDates(S.monthOffset);
  const today2  = fmtDate(new Date());
  const weekMap = new Map();
  for (const d of mDates) {
    const wk  = getWeekNumber(d);
    const key = `${d.getFullYear()}-${wk}`;
    if (!weekMap.has(key)) weekMap.set(key, { wk, dates: [null, null, null, null, null] });
    weekMap.get(key).dates[d.getDay() - 1] = d;
  }
  let mRows = "";
  for (const { wk, dates } of weekMap.values()) {
    mRows += `<tr><td style="font-size:10px;color:var(--eco-muted);font-weight:600;padding:4px 4px 4px 12px">W${wk}</td>`;
    for (const d of dates) {
      if (!d) { mRows += '<td></td>'; continue; }
      const dk2        = fmtDate(d);
      const isToday    = dk2 === today2;
      const cell       = S.userName ? wBadge(dk2, S.userName) : `<span style="font-size:10px;color:#ddd">—</span>`;
      const isSelected = dk2 === dk;
      mRows += `<td class="month-cell${isSelected ? ' selected' : ''}${isToday ? ' today' : ''}" onclick="selectDate('${dk2}')"><div class="month-date${isToday ? ' today' : ''}">${d.getDate()}</div>${cell}</td>`;
    }
    mRows += '</tr>';
  }
  return `<div class="att-card"><h3>Maandoverzicht — ${monthLabel(S.monthOffset)}${S.userName ? ` — ${S.userName}` : ''}</h3><div class="team-list"><table class="team-table"><thead><tr><th></th><th>ma</th><th>di</th><th>wo</th><th>do</th><th>vr</th></tr></thead><tbody>${mRows}</tbody></table></div></div><div class="hint">Klik op een dag om de status te bekijken of aan te passen.</div>`;
}

// maxId: 11 | 20 | 8
// labelPrefix: "" (produces "1".."11") | "G" (produces "G1".."G8")
function renderAdminDeskGrid(loc, maxId, cfg, labelPrefix) {
  const schedule = loc === "grn" ? cfg.grn : loc === "hgv_bg" ? cfg.hgv_bg : cfg.hgv;
  let grid = `<div class="admin-grid"><div class="lbl">Plek</div>${DAYS.map(d => `<div class="lbl">${d}</div>`).join("")}`;
  for (let id = 1; id <= maxId; id++) {
    grid += `<div class="desk-label">${labelPrefix}${id}</div>`;
    DAYS.forEach(d => {
      const v = schedule[id]?.[d] || "";
      grid += `<input value="${v}" onchange="admSetDesk('${loc}',${id},'${d}',this.value)"/>`;
    });
  }
  grid += `</div>`;
  return grid;
}

// ── Modal HTML ──
function renderModal() {
  if (!S.modal) return "";
  const m  = S.modal, s = m.state, dl = m.dateLabel, lb = m.label || m.deskId, pf = m.pfx || "";
  let mc = "";
  if (s.status === "fixed") {
    mc = `<h3>Plek ${lb} — ${s.fixedPerson}</h3><p>Vaste werkplek op ${dl}.<br>Is ${s.fixedPerson.split(" ")[0]} afwezig?</p><div class="modal-actions"><button class="modal-btn orange" onclick="markAbsent(${m.deskId},'${m.dateKey}','${pf}')">🏠 Afmelden</button><button class="modal-btn ghost" onclick="closeModal()">Sluiten</button></div>`;
  } else if (s.status === "available") {
    mc = `<h3>Plek ${lb} — beschikbaar</h3><p>Vrij op ${dl}.</p><div class="modal-actions"><button class="modal-btn green" onclick="reserveDesk(${m.deskId},'${m.dateKey}','${pf}')">📌 Reserveren</button><button class="modal-btn ghost" onclick="unmarkAbsent(${m.deskId},'${m.dateKey}','${pf}')">Afmelding ongedaan</button><button class="modal-btn ghost" onclick="closeModal()">Sluiten</button></div>`;
  } else if (s.status === "flex") {
    mc = `<h3>Plek ${lb} — flexplek</h3><p>Vrij te reserveren op ${dl}.</p><div class="modal-actions"><button class="modal-btn green" onclick="reserveDesk(${m.deskId},'${m.dateKey}','${pf}')">📌 Reserveren</button><button class="modal-btn ghost" onclick="closeModal()">Sluiten</button></div>`;
  } else if (s.status === "mine") {
    mc = `<h3>Plek ${lb} — jouw reservering</h3><p>Gereserveerd op ${dl}.</p><div class="modal-actions"><button class="modal-btn red" onclick="cancelRes(${m.deskId},'${m.dateKey}','${pf}')">Annuleren</button><button class="modal-btn ghost" onclick="closeModal()">Sluiten</button></div>`;
  } else if (s.status === "reserved") {
    mc = `<h3>Plek ${lb} — gereserveerd</h3><p>Door <strong>${s.reservedBy}</strong> op ${dl}.</p><div class="modal-actions"><button class="modal-btn ghost" onclick="closeModal()">Sluiten</button></div>`;
  }
  return `<div class="overlay" onclick="closeModal()"><div class="modal" onclick="event.stopPropagation()">${mc}</div></div>`;
}

// ── Tab renderers ──
function renderAanwezigheid(cfg, dk, dy, sel, wd, today, empNames) {
  const myStatus  = getAtt(dk, S.userName, S.period);
  const myNote    = getAttNote(dk, S.userName);
  const chipHtml  = cfg.statuses.map(s =>
    `<div class="att-chip ${s.cls}${myStatus === s.id ? " selected" : ""}" onclick="setMyStatus('${dk}','${s.id}')">${s.label}</div>`
  ).join("");

  const { kantoor, thuis, veld, vrij } = countAttendance(dk, empNames);
  const statsHtml = renderStatsBar([
    { num: kantoor, lbl: "Kantoor", color: "var(--eco-green)"  },
    { num: thuis,   lbl: "Thuis",   color: "var(--eco-blue)"   },
    { num: veld,    lbl: "Veld",    color: "var(--eco-orange)" },
    { num: vrij,    lbl: "Vrij/Ziek", color: "#9E9E9E"         },
  ]);

  const filterBar = `<div class="filter-bar" style="justify-content:flex-end"><div class="view-toggle"><button class="view-btn${S.viewMode === 'week' ? ' active' : ''}" onclick="setViewMode('week')">Week</button><button class="view-btn${S.viewMode === 'maand' ? ' active' : ''}" onclick="setViewMode('maand')">Maand</button></div></div>`;

  const overviewHtml = S.viewMode === 'week'
    ? renderWeekOverview(cfg, wd, dk)
    : renderMonthOverview(dk, today);

  const noteSection = S.userName
    ? `<div class="att-note"><input id="noteInput" placeholder="Opmerking (bijv. 'tot 14:00')" value="${myNote}" onkeydown="if(event.key==='Enter')saveNote('${dk}')"/><button onclick="saveNote('${dk}')">Opslaan</button></div>`
    : "";

  return `${statsHtml}
    <div class="att-card"><h3>Jouw status — ${fmtNL(sel)}</h3><div class="period-toggle"><div class="period-btn${S.period === "hele_dag" ? " active" : ""}" onclick="setPeriod('hele_dag')">Hele dag</div><div class="period-btn${S.period === "ochtend" ? " active" : ""}" onclick="setPeriod('ochtend')">Ochtend</div><div class="period-btn${S.period === "middag" ? " active" : ""}" onclick="setPeriod('middag')">Middag</div></div><div class="att-my"><div class="att-my-row">${S.userName ? chipHtml : '<span style="color:#aaa;font-size:13px">Vul eerst je naam in</span>'}</div>${noteSection}</div></div>
    ${filterBar}${overviewHtml}`;
}

function renderWerkplekken(cfg, dk, dy, sel) {
  if (S.floor !== "hgv1" && S.floor !== "hgv0" && S.floor !== "grn") S.floor = "hgv1";
  const ci = FLOORS.findIndex(f => f.id === S.floor);
  const cf = FLOORS[ci] || FLOORS[0];
  const fc = renderFloor(dk, dy, sel, cf.loc, cf.svgFn);
  return `<div class="floor-nav"><button onclick="chgFloor(-1)"${ci > 0 ? "" : " disabled"}>‹</button><div class="floor-label">${cf.label}${cf.sub ? `<br><span class="floor-sub">${cf.sub}</span>` : ""}</div><button onclick="chgFloor(1)"${ci < FLOORS.length - 1 ? "" : " disabled"}>›</button></div>${fc}`;
}

  const cfg      = getCfg();
  const wd       = weekDates(S.weekOffset);
  const sel      = wd[S.selectedDayIdx];
  const dk       = fmtDate(sel);
  const dy       = dKey(sel);
  const today    = fmtDate(new Date());
  const empNames = cfg.employees.filter(e => e !== "|");

  // User row
  let userHtml;
  if (!S.userName) {
    const nameOpts = empNames.map(n => `<option value="${n}">${n}</option>`).join('');
    userHtml = `<div class="name-section"><select id="ni"><option value="">— Kies je naam —</option>${nameOpts}</select><button class="btn" onclick="saveName()">Start</button></div>`;
  } else {
    userHtml = `<div class="user-row"><div class="user-pill">👤 ${S.userName}</div><button class="link-btn" onclick="clearName()">wijzig</button></div>`;
  }

  // Day tabs
  const dayHtml = wd.map((d, i) =>
    `<div class="day-tab${S.selectedDayIdx === i ? " active" : ""}${fmtDate(d) === today ? " today" : ""}" onclick="selDay(${i})"><div class="dn">${fmtNL(d).split(" ")[0]}</div><div class="dd">${d.getDate()}</div></div>`
  ).join("");

  // Nav bar (week / month depending on tab + view)
  let navHtml;
  if (S.tab === "admin") {
    navHtml = "";
  } else if (S.tab === "aanwezigheid" && S.viewMode === "maand") {
    navHtml = `<div class="week-nav"><button onclick="chgMonth(-1)">‹</button><span>${monthLabel(S.monthOffset)}</span><button onclick="chgMonth(1)">›</button></div>`;
  } else {
    navHtml = `<div class="week-nav"><button onclick="chgWeek(-1)">‹</button><span>${weekLabel(S.weekOffset)}</span><button onclick="chgWeek(1)">›</button></div><div class="day-tabs">${dayHtml}</div>`;
  }

  // Tab content
  let content = "";
  if (S.tab === "aanwezigheid") content = renderAanwezigheid(cfg, dk, dy, sel, wd, today, empNames);
  if (S.tab === "werkplekken")  content = renderWerkplekken(cfg, dk, dy, sel);
  if (S.tab === "admin")        content = renderAdmin(cfg, empNames);

  document.getElementById("app").innerHTML = `
    <div class="header"><div class="header-icon">🌿</div><div><h1>Eco Reest</h1><p>Aanwezigheid & Werkplekken</p></div></div>
    ${userHtml}
    <div class="main-tabs">
      <div class="main-tab${S.tab === "aanwezigheid" ? " active" : ""}" onclick="setTab('aanwezigheid')">📋 Aanwezigheid</div>
      <div class="main-tab${S.tab === "werkplekken"  ? " active" : ""}" onclick="setTab('werkplekken')">🗺️ Werkplekken</div>
      <div class="main-tab${S.tab === "admin"        ? " active" : ""}" onclick="setTab('admin')">⚙️</div>
    </div>
    ${navHtml}
    ${content}${renderModal()}
    ${S.toast ? `<div class="toast ${S.toast.type}">${S.toast.msg}</div>` : ""}`;
}

// ── Handlers ──
window.saveName = () => {
  const v = document.getElementById("ni")?.value?.trim();
  if (!v) return;
  S.userName = v;
  localStorage.setItem("ecoreest-username", v);
  render();
};

window.clearName = () => {
  S.userName = "";
  localStorage.removeItem("ecoreest-username");
  render();
};

window.setTab = t => {
  S.tab = t;
  render();
};

window.chgWeek = d => {
  S.weekOffset += d;
  S.selectedDayIdx = 0;
  render();
};

window.selDay = i => {
  S.selectedDayIdx = i;
  render();
};

window.setPeriod = p => {
  S.period = p;
  render();
};

window.chgFloor = dir => {
  const ids = FLOORS.map(f => f.id);
  const i   = ids.indexOf(S.floor);
  const n   = i + dir;
  if (n >= 0 && n < ids.length) {
    S.floor = ids[n];
    render();
  }
};

window.setMyStatus = (dk, status) => {
  const cur = getAtt(dk, S.userName, S.period);
  if (cur === status) {
    setAtt(dk, S.userName, null, S.period);
    toast("Status gewist", "info");
    render();
  } else {
    setAtt(dk, S.userName, status, S.period);
    if (OFFICE_STATUSES.includes(status)) {
      if (DESK_LOCATIONS.includes(status)) {
        const wd2 = weekDates(S.weekOffset);
        const sel2 = wd2[S.selectedDayIdx];
        const dy2  = dKey(sel2);
        const fd   = hasFixedDesk(S.userName, dy2, status);
        if (fd) {
          toast(`${getCfg().statuses.find(s => s.id === status)?.label} — vaste plek ${fd} ✓`);
        } else {
          S.floor = status === "groningen" ? "grn" : "hgv1";
          toast(`${getCfg().statuses.find(s => s.id === status)?.label} — kies je werkplek`);
          S.tab = "werkplekken";
        }
      } else {
        toast(`Status: ${getCfg().statuses.find(s => s.id === status)?.label} ✓`);
      }
    } else {
      toast(`Status: ${getCfg().statuses.find(s => s.id === status)?.label}`);
    }
    render();
  }
};

window.saveNote = dk => {
  setAttNote(dk, S.userName, (document.getElementById("noteInput")?.value || "").trim());
  toast("Opmerking opgeslagen");
  render();
};

window.deskClick = (id, loc) => {
  if (!S.userName) { toast("Vul eerst je naam in!", "warn"); return; }
  const wd2      = weekDates(S.weekOffset);
  const sel      = wd2[S.selectedDayIdx];
  const dk2      = fmtDate(sel);
  const dy2      = dKey(sel);
  const location = loc || (S.floor === "grn" ? "grn" : S.floor === "hgv0" ? "hgv_bg" : "hgv");
  const ds       = computeDesks(dk2, dy2, location);
  const pfx      = location === "grn" ? "grn_" : location === "hgv_bg" ? "hgvbg_" : "";
  const label    = location === "grn" ? `G${id}` : id;
  S.modal = { deskId: id, state: ds[id], dateKey: dk2, dateLabel: fmtNL(sel), pfx, label, location };
  render();
};

window.markAbsent = (id, dk, pfx) => {
  const k = pfx + dk;
  if (!S.desk.absences[k]) S.desk.absences[k] = {};
  S.desk.absences[k][id] = true;
  save();
  S.modal = null;
  toast("Plek vrijgemeld");
  render();
};

window.unmarkAbsent = (id, dk, pfx) => {
  const k = pfx + dk;
  if (S.desk.absences[k])     delete S.desk.absences[k][id];
  if (S.desk.reservations[k]) delete S.desk.reservations[k][id];
  save();
  S.modal = null;
  toast("Ongedaan gemaakt", "info");
  render();
};

window.reserveDesk = (id, dk, pfx) => {
  // Check if user has a fixed desk anywhere on this day — if so, block
  const wd2  = weekDates(S.weekOffset);
  const sel  = wd2[S.selectedDayIdx];
  const dy2  = dKey(sel);
  const fd   = hasFixedDesk(S.userName, dy2, null, dk);
  if (fd) {
    toast(`Je hebt al vaste plek ${fd} vandaag`, "warn");
    S.modal = null;
    render();
    return;
  }
  // Check if user already has a reservation on this day (any location) and remove it
  const prefixes = ["", "grn_", "hgvbg_"];
  for (const p of prefixes) {
    const key    = p + dk;
    const dayRes = S.desk.reservations[key];
    if (dayRes) {
      const toDelete = [];
      for (const deskId in dayRes) {
        if (dayRes[deskId] === S.userName) toDelete.push(deskId);
      }
      toDelete.forEach(d => delete dayRes[d]);
      if (Object.keys(dayRes).length === 0) delete S.desk.reservations[key];
    }
  }
  const k = pfx + dk;
  if (!S.desk.reservations[k]) S.desk.reservations[k] = {};
  S.desk.reservations[k][String(id)] = S.userName;
  // Auto-update attendance to match the location of the reserved desk
  const newStatus = pfx === "grn_" ? "groningen" : "hoogeveen";
  setAtt(dk, S.userName, newStatus, "hele_dag");
  save();
  S.modal = null;
  toast("Plek gereserveerd!");
  render();
};

window.cancelRes = (id, dk, pfx) => {
  const k = pfx + dk;
  if (S.desk.reservations[k]) delete S.desk.reservations[k][id];
  save();
  S.modal = null;
  toast("Geannuleerd", "info");
  render();
};

window.closeModal = () => {
  S.modal = null;
  render();
};

// ── Admin handlers ──
window.adminLogin = () => {
  const pw = document.getElementById("adminPw")?.value;
  if (pw === ADMIN_PW) {
    S.adminAuth = true;
    toast("Admin ingelogd");
    render();
  } else {
    toast("Onjuist wachtwoord", "warn");
  }
};

window.admAddEmp = () => {
  const v = document.getElementById("newEmp")?.value?.trim();
  if (!v) return;
  const cfg = getCfg();
  cfg.employees.push(v);
  saveConfig(cfg);
  toast(`${v} toegevoegd`);
  render();
};

window.admRemoveEmp = i => {
  const cfg  = getCfg();
  const name = cfg.employees[i];
  cfg.employees.splice(i, 1);
  saveConfig(cfg);
  toast(`${name} verwijderd`, "info");
  render();
};

window.admAddSep = () => {
  const cfg = getCfg();
  cfg.employees.push("|");
  saveConfig(cfg);
  toast("Scheidingslijn toegevoegd");
  render();
};

window.admSetDesk = (loc, id, day, val) => {
  const cfg      = getCfg();
  const schedule = loc === "grn" ? cfg.grn : loc === "hgv_bg" ? cfg.hgv_bg : cfg.hgv;
  if (!schedule[id]) schedule[id] = {};
  schedule[id][day] = val.trim() || null;
  if (loc === "grn")    cfg.grn    = schedule;
  else if (loc === "hgv_bg") cfg.hgv_bg = schedule;
  else                  cfg.hgv    = schedule;
  saveConfig(cfg);
};

window.admAddStatus = () => {
  const id    = document.getElementById("newStatId")?.value?.trim().toLowerCase();
  const label = document.getElementById("newStatLabel")?.value?.trim();
  if (!id || !label) return;
  const cfg = getCfg();
  if (cfg.statuses.find(s => s.id === id)) { toast("ID bestaat al", "warn"); return; }
  cfg.statuses.push({ id, label, cls: id });
  saveConfig(cfg);
  toast(`${label} toegevoegd`);
  render();
};

window.admRemoveStatus = i => {
  const cfg = getCfg();
  const s   = cfg.statuses[i];
  cfg.statuses.splice(i, 1);
  saveConfig(cfg);
  toast(`${s.label} verwijderd`, "info");
  render();
};

window.admReset = () => {
  if (confirm("Alle admin-instellingen terugzetten naar standaard? Aanwezigheid en reserveringen blijven behouden.")) {
    fetch('/api/reset-config', { method: 'POST' })
      .then(() => { S.adminCfg = null; toast("Reset naar standaard"); render(); })
      .catch(() => toast("Reset mislukt", "warn"));
  }
};

window.syncAfas = async () => {
  toast("AFAS synchroniseren...", "info");
  try {
    const r = await fetch('/api/sync-afas', { method: 'POST' });
    const d = await r.json();
    if (d.ok) {
      toast(`Sync klaar — ${d.employees_synced} medewerkers, ${d.absences_added} vrije dagen ingevuld`);
      const resp = await fetch('/api/data');
      if (resp.ok) {
        const data = await resp.json();
        S.attendance = data.attendance || {};
        S.desk       = data.desk       || { absences: {}, reservations: {} };
        S.adminCfg   = data.adminCfg   || null;
      }
      render();
    } else {
      toast(`Sync mislukt: ${d.error}`, "warn");
    }
  } catch (e) {
    toast("Sync mislukt", "warn");
  }
};

window.setViewMode = m => {
  S.viewMode = m;
  render();
};

window.chgMonth = d => {
  S.monthOffset += d;
  render();
};

window.selectDate = dk => {
  const d      = new Date(dk);
  const today  = new Date();
  const todayMon = new Date(today);
  todayMon.setDate(today.getDate() - ((today.getDay() + 6) % 7));
  const selMon = new Date(d);
  selMon.setDate(d.getDate() - ((d.getDay() + 6) % 7));
  const diff = Math.round((selMon - todayMon) / 86400000);
  S.weekOffset      = Math.round(diff / 7);
  S.selectedDayIdx  = d.getDay() - 1;
  render();
  setTimeout(() => document.querySelector('.att-card')?.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
};

// Start de app — laad data van de server
if (S.selectedDayIdx < 0) S.selectedDayIdx = 0;
initApp();
</script>
</body>
</html>
